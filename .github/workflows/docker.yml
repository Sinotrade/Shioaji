name: docker autobuild

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish, for example v1.5.0'
        required: true
        default: 'v1.5.0'
      publish:
        description: 'Push Docker images'
        required: true
        default: 'false'
  push:
    tags:
      - '*'

jobs:
  tag_latest:
    name: Build Python image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image tags
        id: image
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          case "$VERSION" in
            v[0-9]*.[0-9]*.[0-9]*|[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid version: $VERSION" >&2; exit 1 ;;
          esac
          VERSION_NO_V="${VERSION#v}"
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.publish }}" = "true" ]; then
            PUSH=true
          else
            PUSH=false
          fi
          {
            echo "version=$VERSION"
            echo "version_no_v=$VERSION_NO_V"
            echo "push=$PUSH"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ steps.image.outputs.push }}
          platforms: linux/amd64,linux/arm64
          tags: |
            sinotrade/shioaji:${{ steps.image.outputs.version }}
            sinotrade/shioaji:${{ steps.image.outputs.version_no_v }}
            sinotrade/shioaji:latest

  server:
    name: Build server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image tags
        id: image
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          case "$VERSION" in
            v[0-9]*.[0-9]*.[0-9]*|[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid version: $VERSION" >&2; exit 1 ;;
          esac
          VERSION_NO_V="${VERSION#v}"
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.publish }}" = "true" ]; then
            PUSH=true
          else
            PUSH=false
          fi
          {
            echo "version=$VERSION"
            echo "version_no_v=$VERSION_NO_V"
            echo "push=$PUSH"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-server
          push: ${{ steps.image.outputs.push }}
          platforms: linux/amd64,linux/arm64
          tags: |
            sinotrade/shioaji-server:${{ steps.image.outputs.version }}
            sinotrade/shioaji-server:${{ steps.image.outputs.version_no_v }}
            sinotrade/shioaji-server:latest
